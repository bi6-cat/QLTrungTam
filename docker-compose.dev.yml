services:
  app:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "apk add --no-cache tzdata && npm install && npx prisma migrate deploy && npm run prisma:seed && npm run dev"
    ports:
      - "3001:3000"
    env_file: .env
    environment:
      TZ: Asia/Ho_Chi_Minh
      DATABASE_URL: postgresql://hoctro:${DB_PASSWORD:-change-me}@db:5432/hoctro?schema=public
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      - db
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: hoctro
      POSTGRES_USER: hoctro
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
volumes:
  db_data:
  node_modules:

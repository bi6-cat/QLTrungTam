name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/qltrungtam_test?schema=public
      SESSION_SECRET: ci-session-secret-at-least-16-characters
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: qltrungtam_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d qltrungtam_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run prisma:validate
      - run: npm run prisma:deploy
      - run: npm run typecheck
      - run: npm test
      - run: npm run test:integration
      - run: npm run build
